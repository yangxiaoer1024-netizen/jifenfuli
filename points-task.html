<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>积分福利 - 华医科技</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10B981;
            --primary-light: #D1FAE5;
            --primary-dark: #059669;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: #F3F4F6;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #E5E7EB;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Phone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Status Bar */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 44px;
            background: var(--bg-primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 28px 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-time {
            color: var(--text-primary);
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .status-icons svg {
            width: 16px;
            height: 16px;
            color: var(--text-primary);
        }

        /* Header */
        .header {
            position: sticky;
            top: 44px;
            z-index: 99;
            background: var(--bg-primary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .header-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .header-back:hover {
            background: var(--bg-secondary);
        }

        .header-back svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-share {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .header-share:hover {
            background: var(--bg-secondary);
        }

        .header-share svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        /* Share Drawer Overlay */
        .share-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .share-overlay.active {
            display: flex;
        }

        .share-drawer {
            width: 375px;
            background: var(--bg-primary);
            border-radius: 16px 16px 0 0;
            padding: 20px 20px 32px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .share-drawer-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .share-options {
            display: flex;
            justify-content: space-around;
            margin-bottom: 16px;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .share-option:hover {
            background: var(--bg-secondary);
        }

        .share-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .share-icon svg {
            width: 26px;
            height: 26px;
            color: #fff;
        }

        .share-icon.wechat { background: #07C160; }
        .share-icon.qq { background: #1296DB; }
        .share-icon.moments { background: #07C160; }
        .share-icon.message { background: #FF9500; }

        .share-option-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .share-cancel {
            width: 100%;
            padding: 14px 0;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .share-cancel:hover {
            background: var(--bg-tertiary);
        }

        /* Scrollable Content */
        .content-wrapper {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .content-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Points Card */
        .points-card {
            background: #FFFFFF;
            margin: 16px 20px;
            padding: 20px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .points-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .points-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .points-avatar svg {
            width: 24px;
            height: 24px;
            color: var(--text-tertiary);
        }

        .points-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .points-value {
            font-size: 28px;
            font-weight: 700;
            color: #10B981;
            line-height: 1;
        }

        .points-value span {
            font-size: 14px;
            font-weight: 500;
            color: #333333;
            margin-left: 4px;
        }

        .points-expire {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .points-exchange-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .points-exchange-btn:hover {
            background: var(--primary-dark);
        }

        .points-exchange-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Task Section */
        .task-section {
            background: var(--bg-primary);
            margin-top: 10px;
            padding: 16px 0;
        }

        .task-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px 12px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .task-subtitle {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: var(--bg-secondary);
        }

        .task-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-icon svg {
            width: 22px;
            height: 22px;
        }

        /* Task Icon Color Variants */
        .task-icon.blue {
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
        }
        .task-icon.blue svg {
            color: #3B82F6;
        }

        .task-icon.yellow {
            background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%);
        }
        .task-icon.yellow svg {
            color: #F59E0B;
        }

        .task-icon.red {
            background: linear-gradient(135deg, #FEF2F2 0%, #FEE2E2 100%);
        }
        .task-icon.red svg {
            color: #EF4444;
        }

        .task-icon.purple {
            background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
        }
        .task-icon.purple svg {
            color: #8B5CF6;
        }

        .task-icon.green {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
        }
        .task-icon.green svg {
            color: #10B981;
        }

        .task-icon.orange {
            background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
        }
        .task-icon.orange svg {
            color: #F97316;
        }

        .task-icon.pink {
            background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%);
        }
        .task-icon.pink svg {
            color: #EC4899;
        }

        .task-icon.cyan {
            background: linear-gradient(135deg, #ECFEFF 0%, #CFFAFE 100%);
        }
        .task-icon.cyan svg {
            color: #06B6D4;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .task-reward {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-btn {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .task-btn:hover {
            background: var(--primary-dark);
        }

        /* Home Indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #000;
            border-radius: 3px;
            opacity: 0.2;
        }

        /* Share Drawer */
        .share-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .share-overlay.active {
            display: flex;
        }

        .share-drawer {
            width: 100%;
            background: var(--bg-primary);
            border-radius: 16px 16px 0 0;
            padding: 24px 20px 34px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .share-drawer-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .share-options {
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            margin-bottom: 20px;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .share-option:hover {
            background: var(--bg-secondary);
        }

        .share-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .share-icon svg {
            width: 26px;
            height: 26px;
            color: #fff;
            fill: none;
            stroke: #fff;
            stroke-width: 1.5;
        }

        .share-icon.wechat { background: #07C160; }
        .share-icon.qq { background: #1296DB; }
        .share-icon.moments { background: #07C160; }
        .share-icon.message { background: #FF9500; }

        .share-option-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .share-cancel {
            width: 100%;
            padding: 14px 0;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .share-cancel:hover {
            background: var(--bg-tertiary);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(31, 41, 55, 0.95);
            color: #fff;
            padding: 14px 28px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 300;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .task-btn.completed {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: default;
        }

        .task-btn.completed:hover {
            background: var(--bg-tertiary);
        }
    </style>
</head>

    <script>
        function goBack() {
            window.location.href = 'personal-center-375x812.html';
        }

        function openShare() {
            document.getElementById('shareOverlay').classList.add('active');
        }

        function closeShare(e) {
            if (e && e.target.id === 'shareOverlay') {
                document.getElementById('shareOverlay').classList.remove('active');
            }
        }

        function shareTo(platform) {
            alert('已分享到' + { wechat: '微信', qq: 'QQ', moments: '朋友圈', message: '私信好友' }[platform]);
            document.getElementById('shareOverlay').classList.remove('active');
        }

        // Toast logic
        let currentPoints = 288;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function completeTask(btn) {
            if (btn.classList.contains('completed')) return;
            currentPoints += 50;
            document.querySelector('.points-value').innerHTML = currentPoints + '<span>医豆</span>';
            btn.textContent = '已完成';
            btn.classList.add('completed');
            btn.disabled = true;
            showToast('恭喜获得医豆 +50');
        }

        // Bind task buttons
        document.querySelectorAll('.task-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                completeTask(this);
            });
        });
    </script>
