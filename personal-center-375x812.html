<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人中心 - 华医科技</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10B981;
            --primary-light: #D1FAE5;
            --primary-dark: #059669;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: #F3F4F6;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #E5E7EB;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Phone Frame */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Status Bar - sticky at very top */
        .status-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            height: 44px;
            background: var(--bg-primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 28px 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-time {
            color: var(--text-primary);
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .status-icons svg {
            width: 16px;
            height: 16px;
            color: var(--text-primary);
        }

        /* Header - fixed below status bar */
        .header {
            position: sticky;
            top: 44px;
            z-index: 99;
            background: var(--bg-primary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #10B981 0%, #34D399 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            line-height: 1.2;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-secondary);
        }

        /* User Card */
        .user-card {
            background: var(--bg-primary);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border: 3px solid var(--bg-primary);
        }

        .avatar-status {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .username {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .edit-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-tertiary);
        }

        .edit-btn:hover {
            background: var(--border);
        }

        .edit-btn svg {
            width: 11px;
            height: 11px;
        }

        .verify-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #92400E;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .verify-badge:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .verify-badge svg {
            width: 12px;
            height: 12px;
        }

        .resume-btn {
            padding: 6px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .resume-btn:hover {
            background: var(--bg-tertiary);
        }

        .resume-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resume-icon svg {
            width: 18px;
            height: 18px;
            color: var(--primary);
        }

        .resume-text {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Stats Section */
        .stats-section {
            background: var(--bg-primary);
            padding: 0 20px 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            align-items: end;
        }

        .stat-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 4px 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 52px;
            align-self: end;
        }

        .stat-item:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .stat-value.small {
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Section */
        .section {
            background: var(--bg-primary);
            margin-top: 4px;
            padding: 0;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Menu Items */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:first-child {
            border-top: none;
        }

        .menu-item:hover {
            background: var(--bg-secondary);
        }

        .menu-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-icon svg {
            width: 18px;
            height: 18px;
        }

        .menu-icon.blue {
            background: #EFF6FF;
            color: #3B82F6;
        }

        .menu-icon.orange {
            background: #FFF7ED;
            color: #F97316;
        }

        .menu-icon.green {
            background: #ECFDF5;
            color: #10B981;
        }

        .menu-icon.purple {
            background: #F5F3FF;
            color: #8B5CF6;
        }

        .menu-icon.red {
            background: #FEF2F2;
            color: #EF4444;
        }

        .menu-icon.gray {
            background: #F3F4F6;
            color: #6B7280;
        }

        .menu-content {
            flex: 1;
            min-width: 0;
        }

        .menu-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .menu-desc {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .menu-action {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .menu-tag {
            padding: 3px 8px;
            background: var(--primary-light);
            color: var(--primary-dark);
            font-size: 11px;
            font-weight: 500;
            border-radius: 10px;
        }

        .menu-arrow {
            width: 18px;
            height: 18px;
            color: var(--text-tertiary);
        }

        /* Bottom Navigation - Absolute within phone frame */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 22px;
            border-top: 1px solid var(--border);
            z-index: 98;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            color: var(--text-tertiary);
        }

        .nav-item span {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .nav-item.active svg,
        .nav-item.active span {
            color: var(--primary);
        }

        .nav-item:hover svg,
        .nav-item:hover span {
            color: var(--primary);
        }

        /* Home Indicator - Absolute within phone frame */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #000;
            border-radius: 3px;
            opacity: 0.2;
            z-index: 99;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Scrollable Content */
        .content-wrapper {
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .content-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Bounce animation on scroll */
        @keyframes bounceIn {
            0% { transform: scale(0.995); }
            50% { transform: scale(1.002); }
            100% { transform: scale(1); }
        }

        .content-wrapper.bouncing {
            animation: bounceIn 0.4s ease-out;
        }

        .content-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Bounce animation on scroll */
        @keyframes bounceIn {
            0% { transform: scale(0.995); }
            50% { transform: scale(1.002); }
            100% { transform: scale(1); }
        }

        .content-wrapper.bouncing {
            animation: bounceIn 0.4s ease-out;
        }
    </style>
</head>

    <script>
        function goToPointsTask() {
            window.location.href = 'points-task.html';
        }

        // Add click interactions
        document.querySelectorAll('.menu-item, .stat-item').forEach(item => {
            item.addEventListener('click', function() {
                this.style.transform = 'scale(0.97)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });

        // Bounce scroll effect
        const contentWrapper = document.querySelector('.content-wrapper');
        let isBouncing = false;
        let lastScrollTop = 0;
        let bounceTimeout;

        contentWrapper.addEventListener('scroll', function() {
            const scrollTop = this.scrollTop;
            const scrollHeight = this.scrollHeight;
            const clientHeight = this.clientHeight;

            // Clear previous timeout
            clearTimeout(bounceTimeout);

            // Bounce at top
            if (scrollTop <= 0 && !isBouncing) {
                isBouncing = true;
                this.classList.add('bouncing');
                bounceTimeout = setTimeout(() => {
                    this.classList.remove('bouncing');
                    isBouncing = false;
                }, 400);
            }

            // Bounce at bottom
            if (scrollTop + clientHeight >= scrollHeight - 5 && !isBouncing) {
                isBouncing = true;
                this.classList.add('bouncing');
                bounceTimeout = setTimeout(() => {
                    this.classList.remove('bouncing');
                    isBouncing = false;
                }, 400);
            }

            lastScrollTop = scrollTop;
        }, { passive: true });
    </script>
